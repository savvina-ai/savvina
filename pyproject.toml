[tool.semantic_release]
# No version files to update — we only want a git tag + GitHub release
version_toml    = []
version_variables = []
commit_message  = "chore(release): {version} [skip ci]"
tag_format      = "v{version}"

[tool.semantic_release.branches.main]
match      = "main"
prerelease = false

[tool.semantic_release.remote]
type = "github"

[tool.semantic_release.commit_parser_options]
# Types listed here are parsed; any type NOT in minor_tags/patch_tags → no release
allowed_tags = [
    "feat", "fix", "perf",
    "refactor", "style", "test",
    "docs", "build", "ci", "chore",
]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.publish]
upload_to_vcs_release = true   # attach changelog to GitHub release
dist_glob_patterns    = []     # no Python dist artifacts to upload