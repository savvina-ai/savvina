name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write       # push tag + CHANGELOG.md commit
  issues: write         # comment on linked issues when release ships
  pull-requests: write  # comment on linked PRs when release ships

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-24.04

    steps:
      - name: Debug token
        run: echo "Token length=${#TOKEN}"
        env:
          TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install python-semantic-release
        run: pip install python-semantic-release==10.5.3

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: semantic-release version
