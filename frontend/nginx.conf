server {
    listen 8080;
    return 301 https://$host$request_uri;
}

server {
    listen 8443 ssl;
    ssl_certificate     /etc/nginx/certs/localhost+1.pem;
    ssl_certificate_key /etc/nginx/certs/localhost+1-key.pem;

    root /usr/share/nginx/html;
    index index.html;

    # X-Content-Type-Options, X-Frame-Options, Referrer-Policy, Cache-Control, and CSP for /api/
    # paths are all set by the FastAPI SecurityHeadersMiddleware — not duplicated here.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # 'unsafe-inline' for style-src is required: Radix UI and Tailwind inject inline styles at
    # runtime. Nonce-based CSP is not feasible without SSR. Known limitation, documented here.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; report-uri /api/csp-report" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Shared proxy settings for all /api/ locations.
    # nginx inherits proxy_set_header from this server block only when a
    # location block defines no proxy_set_header directives of its own —
    # so the location blocks below must not add any proxy_set_header lines.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # HTTP/1.1 is required for chunked transfer (SSE streaming)
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    # LLM calls (semantic generation, chat) can take several minutes
    proxy_read_timeout    300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    300s;

    location /api/ {
        proxy_pass http://backend:8000;
    }

    # Semantic model generation: fingerprints every column then calls an LLM —
    # easily 5-10 minutes for large schemas (100+ columns). Override timeout only
    # for this endpoint so other API routes keep the tighter 300s limit.
    location ~ ^/api/v1/connections/[^/]+/semantic/generate {
        proxy_pass http://backend:8000;
        proxy_read_timeout    900s;
        proxy_send_timeout    900s;
    }
}
